[env]
# =============================================================================
# Environment Variable Strategy
# =============================================================================
# Non-Sensitive Values
# AWS account ID for the DevOps account - set as GitHub Actions secret for CI/CD
DEVOPS_AWS_ACCOUNT_ID = "982534387049"
# S3 doc hosting configuration - used by deploy-versioned-doc / deploy-latest-doc / view-latest-doc
DOC_HOST_AWS_PROFILE = "esc_app_devops_us_east_1"
DOC_HOST_S3_BUCKET = "esc-app-devops-us-east-1-doc-host"
# AWS CodeArtifact configuration - used by .mise/tasks/codeartifact-env.sh
AWS_CODEARTIFACT_PROFILE = "esc_app_devops_us_east_1"
AWS_CODEARTIFACT_REGION = "us-east-1"
AWS_CODEARTIFACT_DOMAIN_OWNER = "982534387049"
AWS_CODEARTIFACT_DOMAIN = "esc"
AWS_CODEARTIFACT_REPO = "esc-python"

[tools]
python = "3.12"
uv = "latest"

[tasks.venv-create]
description = "🐍 Create Python virtual environment using uv (creates .venv directory)"
run = "uv venv --allow-existing"

[tasks.venv-remove]
description = "🗑️ Remove Python virtual environment (deletes .venv directory)"
run = "rm -r .venv"

[tasks.inst]
description = "💾 Install all Python dependencies using uv (syncs from pyproject.toml and uv.lock)"
depends = ["venv-create"]
run = """
. .mise/tasks/codeartifact-env.sh
uv sync --all-extras
"""

[tasks.test-in-local]
description = "🧪 Test the build in local script"
depends = ["inst"]
run = ".venv/bin/python example_build_lambda_layer_using_uv_in_local.py"

[tasks.test-in-container]
description = "🧪 Test the build in container script"
depends = ["inst"]
run = ".venv/bin/python example_build_lambda_layer_using_uv_in_container.py
